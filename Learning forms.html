<!doctype html>
<title>Learning Forms</title>
<html>
  <head>
    Learning Forms
  </head>
  <body>
    <h1>Learning Forms</h1>
    <form
      action="Learning forms.php"
      method="POST"
      enctype="multipart/form-data"
    >
      <label for="username">username:</label>
      <input
        type="text"
        id="username"
        placeholder="Goofy123"
        minlength="6"
        required
      />
      <br />
      <label for="password">password:</label>
      <input
        type="password"
        id="password"
        minlength="8"
        required
        placeholder="••••••••"
      />
      <br />
      <label for="email">email:</label>
      <input
        type="email"
        id="email"
        placeholder="goofy123@example.com"
        required
      />
      <br />
      <label for="phone">phone number:</label>
      <input
        type="tel"
        id="phone"
        placeholder="123-456-7890"
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
      />
      <br />
      <label for="bday">birthday:</label>
      <input type="date" id="bday" />
      <br />
      <label for="quantity">quantity:</label>
      <input type="number" id="quantity" min="1" max="99" />
      <br />
      <label for="title">title:</label>

      <label for="Mr.">Mr.</label>
      <input type="radio" id="Mr." name="title" value="Mr." />
      <label for="Ms.">Ms.</label>
      <input type="radio" id="Ms." name="title" value="Ms." />
      <label for="PhD.">PhD.</label>
      <input type="radio" id="PhD." name="title" value="PhD" />

      <br />
      <label for="payment">payment:</label>
      <select id="payment" name="payment">
        <option value="credit">credit card</option>
        <option value="debit">debit card</option>
        <option value="paypal">paypal</option>
        <option value="crypto">cryptocurrency</option>
        <option value="cash">cash</option>
        <option value="check">check</option>
        <option value="Gift card">gift card</option>
        <option value="other">other</option></select
      ><br />
      <label for="subscribe">Subscribe</label>
      <input type="checkbox" id="subscribe" name="subscribe" value="yes" />
      <br />
      <label for="comments">Comments:</label>
      <br />
      <textarea
        id="comments"
        name="comments"
        rows="4"
        cols="50"
        placeholder="Enter your comments here..."
      ></textarea>
      <br />
      <label for="file">Upload a file:</label>
      <input type="file" id="file" name="file" />
      <br />
      <input type="reset" />
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
